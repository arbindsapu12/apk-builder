name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ npm project create
      - name: Init npm
        run: npm init -y

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      # ✅ capacitor init
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app --web-dir=.

      # ✅ IMPORTANT FIX: copy first
      - name: Copy Web Files
        run: npx cap copy

      # ✅ add android properly
      - name: Add Android Platform
        run: npx cap add android

      # ✅ sync project
      - name: Sync Project
        run: npx cap sync

      # ✅ build apk
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      # ✅ upload apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: android/app/build/outputs/apk/debug/app-debug.apk
