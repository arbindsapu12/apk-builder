name: Build APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create package.json
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - name: Install dependencies
        run: npm install

      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app || true

      - name: Add Android
        run: npx cap add android || true

      - name: Create web files
        run: |
          mkdir www
          echo "<html><body><h1>My App</h1></body></html>" > www/index.html

      - name: Sync
        run: npx cap sync

      # ✅ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Build AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleDebug

      # ✅ Upload files (UPDATED v4)
      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/debug/app-debug.aab
