name: Build APK

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: "Website URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Create package.json
      - name: Setup Project
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - run: npm install

      # 5. Init Capacitor
      - run: npx cap init myapp com.myapp.app

      # 6. Create Web Files
      - name: Create Web Files
        run: |
          mkdir -p www
          echo '<html><body style="margin:0">
          <iframe src="${{ github.event.inputs.website_url }}" 
          style="border:none;width:100%;height:100%"></iframe>
          </body></html>' > www/index.html

      # 7. Add Android
      - run: npx cap add android

      # 8. Sync
      - run: npx cap sync android

      # 9. Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 10. Upload
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
