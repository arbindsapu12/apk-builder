name: Build APK & AAB

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: "Website URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Create package.json
      - name: Setup Project
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - name: Install dependencies
        run: npm install

      # 🔥 5. DELETE OLD ANDROID (VERY IMPORTANT)
      - name: Delete old android
        run: rm -rf android

      # 6. Init Capacitor
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app

      # 7. Create Web Files
      - name: Create Web Files
        run: |
          mkdir -p www
          echo '<html><body style="margin:0">
          <iframe src="${{ github.event.inputs.website_url }}" 
          style="border:none;width:100%;height:100%"></iframe>
          </body></html>' > www/index.html

      # 8. Add Android
      - name: Add Android
        run: npx cap add android

      # 9. Sync
      - name: Sync
        run: npx cap sync android

      - name: Update version
        run: |
          sed -i "s/versionCode 1/versionCode $RANDOM/g" android/app/build.gradle  

      # 10. Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 11. Build AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleDebug

      # 12. Check files
      - name: Find APK & AAB
        run: |
          echo "APK files:"
          find . -name "*.apk"
          echo "AAB files:"
          find . -name "*.aab"

      # 13. Upload files
      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/debug/app-debug.aab
