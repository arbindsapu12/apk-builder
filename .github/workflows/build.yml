name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # npm project create
      - name: Init npm
        run: npm init -y

      # install capacitor
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli

      # init capacitor
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app --web-dir=.

      # 🔥 FIX: android platform force add with logs
      - name: Add Android Platform
        run: |
          npx cap add android
          ls -la
          ls -la android || echo "Android folder not created"

      # 🔥 STOP if android not created
      - name: Check Android Folder
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder missing ❌"
            exit 1
          fi

      # copy files
      - name: Copy Web Files
        run: npx cap copy

      # build apk
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # upload apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: android/app/build/outputs/apk/debug/app-debug.apk
