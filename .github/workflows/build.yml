name: Build APK

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: "Enter Website URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Replace URL
        run: |
          sed -i "s|https://example.com|${{ github.event.inputs.website_url }}|g" app/src/main/java/com/webtoapk/MainActivity.java

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Permission
        run: chmod +x gradlew

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Show logs
        run: |
          ls
          pwd

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: app/build/outputs/apk/debug/app-debug.apk
