name: Build APK

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID"
        required: false
      app_name:
        description: "App Name"
        required: false
      website_url:
        description: "Website URL"
        required: true
      package_id:
        description: "Package ID"
        required: false
      icon_url:
        description: "Icon URL"
        required: false
      splash_url:
        description: "Splash URL"
        required: false
      webhook_url:
        description: "Webhook URL"
        required: false
      webhook_secret:
        description: "Webhook Secret"
        required: false
      supabase_url:
        description: "Supabase URL"
        required: false
      supabase_service_key:
        description: "Supabase Key"
        required: false
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix URL
        run: |
          URL="${{ github.event.inputs.website_url }}"
    
          if [[ $URL != http* ]]; then
            URL="https://$URL"
          fi

          sed -i "s|https://example.com|$URL|g" app/src/main/java/com/example/webtoapk/MainActivity.java

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Create package.json
      - name: Create package.json
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - name: Install dependencies
        run: npm install

      # Init Capacitor
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app || true

      # Add Android
      - name: Add Android
        run: npx cap add android || true

      # Use dynamic URL from website
      - name: Set App Config
        run: |
         echo '{
           "appId": "${{ github.event.inputs.package_id }}",
           "appName": "${{ github.event.inputs.app_name }}",
           "webDir": "www",
           "server": {
             "url": "${{ github.event.inputs.website_url }}",
             "cleartext": true
           }
         }' > capacitor.config.json

      - name: Set App Icon
        run: |
          mkdir -p resources
          curl -L "${{ github.event.inputs.icon_url }}" -o resources/icon.png || true

      - name: Set Splash Screen
        run: |
          curl -L "${{ github.event.inputs.splash_url }}" -o resources/splash.png || true
      # Fix www
      - name: Create web files
        run: |
          mkdir -p www
          echo '<html><body><script>window.location.href="${{ github.event.inputs.website_url }}";</script></body></html>'

      - name: Create Web Files
        run: |
          mkdir -p www
          echo '<html><body><script>window.location.href="${{ github.event.inputs.website_url }}";</script></body></html>' > www/index.html
          ls -la www
          
      # Sync
      - name: Sync
        run: npx cap sync android
          
      - name: Fix Gradle
        run: |
         echo "org.gradle.jvmargs=-Xmx2048m" >> android/gradle.properties
# 👇 YAHA ADD KARNA HAI (NEW CODE)

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android/app/my-release-key.jks \
          -storepass password123 \
          -keypass password123 \
          -alias my-key-alias \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=MyApp, OU=Dev, O=MyOrg, L=City, S=State, C=IN"

      - name: Setup Signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=my-release-key.jks" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=my-key-alias" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=password123" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=password123" >> android/gradle.properties

# 👇 PHIR YE RAHEGA (existing code)
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      # Build AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
