name: Build APK & AAB

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: "Enter Website URL"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo download
      - name: Checkout
        uses: actions/checkout@v3

      # 2. URL replace (dynamic)
      - name: Replace URL
        run: |
          sed -i "s|https://example.com|${{ github.event.inputs.website_url }}|g" app/src/main/java/com/example/webtoapk/MainActivity.java

      # 3. Java setup
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Android setup
      - name: Setup Android
        uses: android-actions/setup-android@v3

      # 5. Gradle permission
      - name: Give permission
        run: chmod +x gradlew

      # 6. Build APK
      - name: Build APK
        run: ./gradlew assembleDebug

      # 7. Build AAB
      - name: Build AAB
        run: ./gradlew bundleRelease

      # 8. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: app/build/outputs/apk/debug/app-debug.apk

      # 9. Upload AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab-file
          path: app/build/outputs/bundle/release/app-release.aab
