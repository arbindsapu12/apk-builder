name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create dummy APK (replace with your build)
        run: |
          echo "This is a dummy APK" > dummy.txt
          mv dummy.txt app.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: app.apk
