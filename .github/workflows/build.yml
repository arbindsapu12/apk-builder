name: Build APK

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID"
        required: false
      app_name:
        description: "App Name"
        required: false
      website_url:
        description: "Website URL"
        required: true
      package_id:
        description: "Package ID"
        required: false
      icon_url:
        description: "Icon URL"
        required: false
      splash_url:
        description: "Splash URL"
        required: false
      webhook_url:
        description: "Webhook URL"
        required: false
      webhook_secret:
        description: "Webhook Secret"
        required: false
      supabase_url:
        description: "Supabase URL"
        required: false
      supabase_service_key:
        description: "Supabase Key"
        required: false
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Create package.json
      - name: Create package.json
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - name: Install dependencies
        run: npm install

      # Init Capacitor
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app || true

      # Add Android
      - name: Add Android
        run: npx cap add android || true

      # Use dynamic URL from website
      - name: Set App Config
        run: |
         echo '{
           "appId": "${{ github.event.inputs.package_id }}",
           "appName": "${{ github.event.inputs.app_name }}",
           "webDir": "www",
           "server": {
             "url": "${{ github.event.inputs.website_url }}",
             "cleartext": true
           }
         }' > capacitor.config.json

      - name: Set App Icon
        run: |
          mkdir -p resources
          curl -L "${{ github.event.inputs.icon_url }}" -o resources/icon.png || true

      - name: Set Splash Screen
        run: |
          curl -L "${{ github.event.inputs.splash_url }}" -o resources/splash.png || true
      # Fix www
      - name: Create web files
        run: |
          mkdir -p www
          echo "<html></html>" > www/index.html

      # Sync
      - name: Sync
        run: npx cap sync

      # Build APK
      - name: Build APK
        run: |
         cd android
         chmod +x gradlew
         ./gradlew assembleRelease

      # Build AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
