name: Build APK

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project ID"
        required: false
      app_name:
        description: "App Name"
        required: false
      website_url:
        description: "Website URL"
        required: true
      package_id:
        description: "Package ID"
        required: false
      icon_url:
        description: "Icon URL"
        required: false
      splash_url:
        description: "Splash URL"
        required: false
      webhook_url:
        description: "Webhook URL"
        required: false
      webhook_secret:
        description: "Webhook Secret"
        required: false
      supabase_url:
        description: "Supabase URL"
        required: false
      supabase_service_key:
        description: "Supabase Key"
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Create package.json
      - name: Create package.json
        run: |
          echo '{
            "name": "webtoapk",
            "version": "1.0.0",
            "private": true,
            "dependencies": {
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/android": "^5.0.0"
            }
          }' > package.json

      - name: Install dependencies
        run: npm install

      # ✅ Init Capacitor
      - name: Init Capacitor
        run: npx cap init myapp com.myapp.app || true

      # ✅ Add Android
      - name: Add Android
        run: npx cap add android || true

      # ✅ Use your real website
      - name: Set App Config
        run: |
          echo '{
            "appId": "com.myapp.app",
            "appName": "WebToAPK",
            "webDir": "www",
            "server": {
              "url": "https://webtoapk.online",
              "cleartext": true
            }
          }' > capacitor.config.json

      # ✅ Fix www error
      - name: Create web files
        run: |
          mkdir -p www
          echo "<html></html>" > www/index.html

      # ✅ Sync
      - name: Sync
        run: npx cap sync

      # ✅ Optimize performance
      - name: Optimize Android
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "org.gradle.daemon=true" >> android/gradle.properties

      # ✅ Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ✅ Build AAB
      - name: Build AAB
        run: |
          cd android
          ./gradlew bundleDebug

      # ✅ Upload files (LATEST VERSION)
      - name: Upload APK & AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-files
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/debug/app-debug.aab
